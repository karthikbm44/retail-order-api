name: Deploy Node.js App

on:
    push:
        branches:
            -main

jobs:
    build-and-run:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm install

            - name: Run Tests
              run: npm test

            - name: Run the application
              run: |
                node app.js &
                sleep 5
                curl http://localhost:3000