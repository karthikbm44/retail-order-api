name: Deploy Node.js App

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Run the application
        run: |
          timeout 20 node app.js &
          SERVER_PID=$!

          echo "Server started with PID: $SERVER_PID"
          sleep 5

          # Try to curl the endpoint with retries
          for i in {1..10}; do
            echo "Attempt $i: Checking if server is responding..."
            if curl -f http://localhost:1010/ 2>/dev/null; then
              echo "✓ Server is responding!"
              exit 0
            fi
            sleep 2
          done

          echo "✗ Server failed to respond"
          exit 1
